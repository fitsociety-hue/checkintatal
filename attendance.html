<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출석체크 - 강동어울림복지관</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
</head>
<body>
  <div class="app-container">
    <nav class="nav-sidebar">
      <div class="logo">강동어울림복지관</div>
      <a href="dashboard.html" class="nav-item">대시보드</a>
      <a href="attendance.html" class="nav-item active">출석체크</a>
      <a href="members.html" class="nav-item">회원 관리</a>
      <a href="programs.html" class="nav-item">사업 관리</a>
      <a href="stats.html" class="nav-item">실적 현황</a>
    </nav>
    
    <main class="main-content">
      <header class="topbar">
        <div>출석부 시스템</div>
        <div class="flex items-center gap-2">
          <span id="topbar-team-name" class="badge badge-neutral"></span>
          <span id="topbar-user-name"></span>
          <button onclick="Auth.logout()" class="btn-ghost" style="padding: 4px 8px;">로그아웃</button>
        </div>
      </header>
      
      <div class="content-body">
        <h2 class="mb-3">출석체크</h2>
        
        <div class="glass-card mb-3">
          <h3 class="mb-2">Step 1. 사업 선택</h3>
          <div id="dropdowns-container"></div>
          
          <div class="form-group" style="max-width: 200px; margin-top: 16px;">
            <label class="form-label">날짜 선택</label>
            <input type="date" id="attendance-date" class="form-input" required>
          </div>
          
          <div id="selected-program-info" class="mt-2 hidden">
            <span class="badge badge-primary" id="badge-type"></span>
            <button id="btn-show-qr" class="btn-secondary" style="margin-left: 10px;">QR코드 생성</button>
            <button id="btn-enter-kiosk" class="btn-primary" style="margin-left: 10px;">이용인 셀프 출석</button>
          </div>
        </div>

        <div class="glass-card mb-3 hidden" id="attendance-section">
          <div class="flex justify-between items-center mb-2">
            <h3>Step 2. 출석 입력</h3>
            <div id="attendance-counter"></div>
          </div>
          
          <!-- Only count input -->
          <div id="count-only-section" class="hidden">
            <div class="form-group" style="max-width: 200px;">
              <label class="form-label">실적 건수</label>
              <input type="number" id="input-count" class="form-input" min="0" value="0">
            </div>
          </div>
          
          <!-- Members list -->
          <div id="members-section" class="hidden">
            <div class="flex flex-mobile-col justify-between items-center mb-2">
              <input type="text" id="search-member" class="form-input" placeholder="이름 검색" style="width: 100%; max-width: 100%;">
              <div>
                <button class="btn-ghost" id="btn-check-all">전체선택</button>
                <button class="btn-ghost" id="btn-uncheck-all">전체해제</button>
              </div>
            </div>
            
            <div id="members-grid" class="attendance-grid">
              <!-- Members injected here -->
            </div>
          </div>

          <div class="mt-3 flex justify-between items-center">
            <button id="btn-save" class="btn-primary">저장하기</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- QR Modal -->
  <div class="modal-overlay" id="qr-modal">
    <div class="glass-card modal-glass text-center">
      <div class="modal-header">
        <h3>QR 출석체크</h3>
        <button class="btn-ghost" onclick="document.getElementById('qr-modal').classList.remove('active')">X</button>
      </div>
      <p class="mb-2 text-sub">참여자에게 아래 QR코드를 보여주세요. (5분간 유효)</p>
      <div id="qrcode" style="display: flex; justify-content: center; margin: 20px 0;"></div>
      <a id="qr-link" href="#" target="_blank" class="btn-ghost" style="font-size: 14px;">새 창에서 열기</a>
    </div>
  </div>

  <!-- Kiosk Mode Overlay -->
  <div id="kiosk-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; overflow-y: auto; padding-bottom: 120px;">
    <div style="padding: 20px; max-width: 800px; margin: 0 auto;">
       <div class="flex justify-between items-center mb-3">
         <h1 id="kiosk-title" style="font-size: 24px; font-weight: 700; color: var(--color-primary);">출석체크</h1>
         <button id="btn-exit-kiosk" class="btn-ghost">닫기 (직원용)</button>
       </div>
       <div class="glass-card mb-3" style="text-align: center; padding: 20px;">
         <p style="font-size: 18px; font-weight: 600; color: var(--color-text);">본인의 이름을 선택하고 하단의 <span style="color:var(--color-primary);">[저장하기]</span> 버튼을 눌러주세요.</p>
       </div>
       <div id="kiosk-grid" class="attendance-grid"></div>
    </div>
    
    <div id="kiosk-bottom-bar" style="position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); display: flex; justify-content: center; z-index: 10000;">
       <button id="btn-kiosk-save" class="btn-primary" style="width: 100%; max-width: 400px; padding: 18px; font-size: 20px; font-weight: 700; border-radius: 30px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);" disabled>이름을 선택해주세요</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/programs.js"></script>
  <script src="js/attendance.js"></script>
</body>
</html>
